# Metapus Cloud Reverse Proxy — Nginx Configuration
#
# Routes tenant requests to the correct server version group using
# auth_request subrequests to /internal/route.
#
# Architecture:
#   Client → Nginx → auth_request → /internal/route (returns X-Version-Group)
#                  → proxy_pass to upstream-$version_group
#
# Each server version runs on a separate port / upstream.
# Nginx dynamically selects the upstream based on the tenant's version group.

# ── Upstreams: one per version group ─────────────────────────────────────
# Add new upstream blocks when deploying new versions.
# The upstream name MUST match the version_group value in the tenants table.

upstream metapus_default {
    server metapus-default:8080;
}

upstream metapus_v1.2.0 {
    server metapus-v1_2_0:8080;
}

upstream metapus_v1.3.0 {
    server metapus-v1_3_0:8080;
}

# ── Router instance ─────────────────────────────────────────────────────
# This lightweight instance handles ONLY the /internal/route lookup.
# It connects to meta-database but serves no tenant requests.
# Can be ANY version — it only reads the tenants table.

upstream metapus_router {
    server metapus-router:8080;
}

# ── Map: version group → upstream ────────────────────────────────────────
# Maps the X-Version-Group header value to an upstream name.
# "default" is the fallback for tenants without an explicit version group.

map $upstream_version_group $backend {
    default         metapus_default;
    "default"       metapus_default;
    "v1.2.0"        metapus_v1.2.0;
    "v1.3.0"        metapus_v1.3.0;
}

server {
    listen 80;
    server_name _;

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/metapus_access.log;
    error_log  /var/log/nginx/metapus_error.log;

    # ── Health & Internal (not routed per-tenant) ────────────────────────
    # These go directly to the router instance.

    location /health/ {
        proxy_pass http://metapus_router;
        proxy_set_header Host $host;
    }

    # Internal route lookup — MUST be blocked from external access.
    # Only Nginx itself calls this via auth_request.
    location = /internal/route {
        internal;  # Block direct external access
        proxy_pass http://metapus_router/internal/route;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
    }

    # ── Public system endpoint (no tenant needed) ────────────────────────
    location = /api/v1/system/version {
        proxy_pass http://metapus_router;
        proxy_set_header Host $host;
    }

    # ── All API requests: route by tenant version group ──────────────────
    location /api/ {
        # Step 1: Resolve tenant → version group via subrequest
        auth_request /internal/route;
        auth_request_set $upstream_version_group $upstream_http_x_version_group;

        # Step 2: Proxy to the correct upstream
        proxy_pass http://$backend;

        # Forward original headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 15s;

        # Error handling: if the version group instance is down
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 1;

        # Custom error pages for routing failures
        error_page 401 = @auth_error;
        error_page 403 = @tenant_suspended;
        error_page 404 = @tenant_not_found;
    }

    # ── Error handlers ───────────────────────────────────────────────────

    location @auth_error {
        default_type application/json;
        return 401 '{"code":"UNAUTHORIZED","message":"Authentication required"}';
    }

    location @tenant_not_found {
        default_type application/json;
        return 404 '{"code":"TENANT_NOT_FOUND","message":"Tenant not found"}';
    }

    location @tenant_suspended {
        default_type application/json;
        return 403 '{"code":"TENANT_SUSPENDED","message":"Tenant is suspended"}';
    }
}
