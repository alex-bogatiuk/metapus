# Metapus Single-Tenant Deployment with Updater Agent
#
# Usage:
#   docker compose up -d
#
# First-time setup:
#   1. docker compose up -d postgres
#      (creates 'tenants' meta-database and schema via init-meta.sql automatically)
#   2. docker compose run --rm --entrypoint ./tenant metapus-app create --slug default --name "Default Tenant"
#      (creates mt_default database, runs migrations, registers tenant — note the Tenant ID)
#   3. Set TENANT_ID in .env
#   4. docker compose up -d
#
# Update via Updater Agent:
#   POST http://localhost:9090/updater/start { "tag": "v1.5.0" }

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: metapus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metapus}
      POSTGRES_DB: tenants
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-meta.sql:/docker-entrypoint-initdb.d/init-meta.sql:ro
    networks:
      - metapus-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U metapus" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Metapus Server ---
  metapus-app:
    image: ${METAPUS_IMAGE:-ghcr.io/alex-bogatiuk/metapus}:${METAPUS_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: "8080"
      APP_ENV: "production"
      LOG_LEVEL: "info"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      META_DATABASE_URL: postgres://metapus:${POSTGRES_PASSWORD:-metapus}@postgres:5432/tenants?sslmode=disable
      DATABASE_URL: postgres://metapus:${POSTGRES_PASSWORD:-metapus}@postgres:5432/mt_default?sslmode=disable
      TENANT_DB_USER: metapus
      TENANT_DB_PASSWORD: ${POSTGRES_PASSWORD:-metapus}
      TENANT_DB_HOST: postgres
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      metapus-net:
        aliases:
          - metapus-app
    healthcheck:
      test: [ "CMD", "./healthcheck", "http://localhost:8080/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Metapus Worker (background jobs) ---
  metapus-worker:
    image: ${METAPUS_IMAGE:-ghcr.io/alex-bogatiuk/metapus}:${METAPUS_TAG:-latest}
    restart: unless-stopped
    entrypoint: [ "./worker" ]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      META_DATABASE_URL: postgres://metapus:${POSTGRES_PASSWORD:-metapus}@postgres:5432/tenants?sslmode=disable
      TENANT_DB_USER: metapus
      TENANT_DB_PASSWORD: ${POSTGRES_PASSWORD:-metapus}
      LOG_LEVEL: "info"
    networks:
      - metapus-net

  # --- Updater Agent (sidecar) ---
  updater:
    image: ${UPDATER_IMAGE:-ghcr.io/alex-bogatiuk/metapus-updater}:${UPDATER_TAG:-latest}
    restart: unless-stopped
    depends_on:
      metapus-app:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - updater-data:/data
    environment:
      UPDATER_PORT: "9090"
      SERVER_URL: http://metapus-app:8080
      TENANT_ID: ${TENANT_ID:?TENANT_ID is required}
      REGISTRY_IMAGE: ${METAPUS_IMAGE:-ghcr.io/alex-bogatiuk/metapus}
      REGISTRY_TOKEN: ${REGISTRY_TOKEN:-}
      DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME:-single-tenant}_metapus-net
      CONTAINER_NAME: metapus-app
      STATE_FILE: /data/state.json
      HEALTH_TIMEOUT: "60s"
      DRAIN_TIMEOUT: "30s"
      LOG_LEVEL: "info"
    ports:
      - "${UPDATER_PORT:-9090}:9090"
    networks:
      - metapus-net

  # --- Frontend (Next.js) ---
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/alex-bogatiuk/metapus-frontend}:${FRONTEND_TAG:-latest}
    restart: unless-stopped
    depends_on:
      metapus-app:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://metapus-app:8080
      NEXT_PUBLIC_TENANT_ID: ${TENANT_ID:?TENANT_ID is required}
      NEXT_PUBLIC_UPDATER_URL: http://updater:9090
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - metapus-net

networks:
  metapus-net:
    driver: bridge

volumes:
  pgdata:
  updater-data:
